site_name: rs-embed
site_description: A unified Python toolkit for Remote Sensing Foundation Model embeddings
repo_url: https://github.com/cybergis/rs-embed
repo_name: cybergis/rs-embed

theme:
  name: material
  icon:
    annotation: material/arrow-right-circle
  features:
    - navigation.tabs
    - navigation.indexes
    - navigation.sections
    - navigation.expand
    - navigation.top
    - toc.follow
    - content.code.copy
    - content.code.annotate
    - content.tabs.link
    - search.suggest
    - search.highlight

markdown_extensions:
  - admonition
  - attr_list
  - md_in_html
  - pymdownx.details
  - pymdownx.highlight
  - pymdownx.inlinehilite
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg
  - pymdownx.arithmatex:
      generic: true
  - toc:
      permalink: true

extra_javascript:
  - https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js

extra_css:
  - stylesheets/extra.css

not_in_nav: |
  /concepts.md
  /workflows.md
  /models_reference.md
  /limitations.md
  /model_detail_template.md
  /models/*.md

nav:
  - Home: index.md
  - Quickstart: quickstart.md
  - Models: models.md
  - API:
    - Overview: api.md
    - Specs & Data Structures: api_specs.md
    - Embedding API: api_embedding.md
    - Export API: api_export.md
    - Inspect API: api_inspect.md
  - Extending: extending.md
